<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Litelead Fixed</title>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.basic.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #3b82f6; --dark: #1e293b; }
        body { margin:0; background: #eef2f7; font-family: 'Quicksand', sans-serif; display:flex; flex-direction:column; align-items:center; min-height:100vh; }
        
        /* Header */
        .top-nav { width: 100%; max-width: 600px; display: flex; justify-content: space-between; padding: 20px; box-sizing: border-box; }
        #logo { color: var(--accent); font-size: 1.5rem; }
        #clock { font-size: 1.5rem; font-weight: bold; color: var(--dark); }

        /* Search Bar Area */
        .search-sticky { position: sticky; top: 0; width: 100%; background: rgba(238,242,247,0.95); backdrop-filter: blur(10px); padding: 15px 0; z-index: 100; display: flex; flex-direction: column; align-items: center; }
        .input-wrap { width: 90%; max-width: 500px; }
        input { width: 100%; padding: 18px 25px; border-radius: 35px; border: 2px solid transparent; background: white; font-size: 1.1rem; outline: none; box-shadow: 0 10px 30px rgba(0,0,0,0.05); transition: 0.3s; }
        input:focus { border-color: var(--accent); }

        /* Tabs */
        .tab-row { display: flex; gap: 10px; margin-top: 15px; }
        .tab { background: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; font-family: inherit; transition: 0.3s; }
        .tab.active { background: var(--accent); color: white; }

        /* Results & Content */
        #content-wall { width: 90%; max-width: 550px; margin-top: 20px; }
        
        .fact-card { background: var(--dark); color: white; padding: 25px; border-radius: 30px; margin-bottom: 20px; animation: bounce 0.5s ease; }
        .fact-card h3 { margin-top: 0; color: var(--accent); }

        .link-card { background: white; padding: 15px 20px; border-radius: 20px; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.02); animation: bounce 0.4s ease; }
        .link-card a { color: var(--accent); text-decoration: none; font-weight: bold; }

        /* Utility Page */
        .util-page { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; animation: bounce 0.5s ease; }
        .util-box { background: white; padding: 30px; border-radius: 30px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.02); }

        @keyframes bounce { 0% { opacity:0; transform: translateY(-20px); } 100% { opacity:1; transform: translateY(0); } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="top-nav">
    <div id="logo">Litelead</div>
    <div id="clock">--:--</div>
</div>

<div class="search-sticky">
    <div class="input-wrap">
        <input type="text" id="main-search" placeholder="Search anything..." autocomplete="off">
    </div>
    <div class="tab-row">
        <button class="tab active" data-view="all">All</button>
        <button class="tab" data-view="utility">Utilities</button>
    </div>
</div>

<div id="content-wall">
    <div id="search-results"></div>
    
    <div id="utility-page" class="hidden">
        <div class="util-page">
