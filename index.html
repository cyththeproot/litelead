<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Litelead Time Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2/dist/fuse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #3b82f6; --bg: #eef2f7; --card: #ffffff; --text: #1e293b; --glass: rgba(238, 242, 247, 0.9); }
        [data-theme="dark"] { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --glass: rgba(15, 23, 42, 0.9); }

        body { margin:0; background: var(--bg); color: var(--text); font-family: 'Quicksand', sans-serif; display:flex; flex-direction:column; align-items:center; min-height: 100vh; transition: 0.3s; }
        .header { width: 100%; max-width: 600px; display: flex; justify-content: space-between; padding: 20px; box-sizing: border-box; }
        #clock { font-size: 1.5rem; opacity: 0.8; }

        .search-sticky { position: sticky; top: 0; width: 100%; background: var(--glass); backdrop-filter: blur(10px); padding: 15px 0; z-index: 100; display: flex; flex-direction: column; align-items: center; }
        input#main-in { width: 90%; max-width: 500px; padding: 18px 25px; border-radius: 35px; border: none; background: var(--card); color: var(--text); font-size: 1.1rem; box-shadow: 0 10px 30px rgba(0,0,0,0.05); outline: none; }

        .tabs { display: flex; gap: 10px; margin-top: 15px; }
        .tab { background: var(--card); color: var(--text); border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; font-family: inherit; }
        .tab.active { background: var(--accent); color: white; }

        #content-wall { width: 90%; max-width: 550px; margin-top: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 25px; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.02); animation: bounce 0.4s ease; }
        
        /* Time UI */
        .time-display { font-size: 2.5rem; font-weight: bold; margin: 10px 0; color: var(--accent); }
        .time-controls { display: flex; gap: 10px; justify-content: center; }
        .btn { padding: 8px 15px; border-radius: 12px; border: none; cursor: pointer; font-family: inherit; font-weight: bold; transition: 0.2s; }
        .btn-start { background: #10b981; color: white; }
        .btn-stop { background: #ef4444; color: white; }
        .btn-reset { background: #64748b; color: white; }
        
        input.time-input { width: 60px; padding: 8px; border-radius: 10px; border: 1px solid #ccc; text-align: center; font-family: inherit; }

        @keyframes bounce { 0% { opacity:0; transform: translateY(-20px); } 100% { opacity:1; transform: translateY(0); } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="header">
    <div style="color:var(--accent); font-size:1.5rem;">Litelead</div>
    <div id="clock">00:00</div>
</div>

<div class="search-sticky">
    <input type="text" id="main-in" placeholder="Search..." autocomplete="off">
    <div class="tabs">
        <button class="tab active" onclick="switchView('all')">Search</button>
        <button class="tab" onclick="switchView('util')">Utilities</button>
    </div>
</div>

<div id="content-wall">
    <div id="results"></div>
    
    <div id="util-view" class="hidden">
        <div class="card" style="text-align: center;">
            <div style="font-size: 0.8rem; opacity: 0.5;">TODAY</div>
            <div id="u-date" style="font-size: 1.8rem; color: var(--accent);">March 04, 2026</div>
        </div>

        <div class="card" style="text-align: center;">
            <div style="font-size: 0.8rem; opacity: 0.5;">COUNTDOWN</div>
            <div id="cd-display" class="time-display">00:00</div>
            <div style="margin-bottom: 15px;">
                Mins: <input type="number" id="cd-mins" class="time-input" value="5">
            </div>
            <div class="time-controls">
                <button class="btn btn-start" onclick="startCountdown()">Start</button>
                <button class="btn btn-reset" onclick="resetCountdown()">Reset</button>
            </div>
        </div>

        <div class="card" style="text-align: center;">
            <div style="font-size: 0.8rem; opacity: 0.5;">STOPWATCH</div>
            <div id="sw-display" class="time-display">00:00.0</div>
            <div class="time-controls">
                <button id="sw-btn" class="btn btn-start" onclick="toggleStopwatch()">Start</button>
                <button class="btn btn-reset" onclick="resetStopwatch()">Reset</button>
            </div>
        </div>

        <div class="card" style="display:flex; justify-content:space-between;">
            <button class="btn btn-reset" onclick="toggleTheme()">Toggle Dark Mode</button>
            <div id="w-info">Temp: --</div>
        </div>
    </div>
</div>

<script>
// --- GLOBAL CLOCK & DATE ---
function updateClock() {
    const d = new Date();
    document.getElementById('clock').innerText = d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    document.getElementById('u-date').innerText = d.toLocaleDateString([], {month:'long', day:'numeric', year:'numeric'});
}
setInterval(updateClock, 1000); updateClock();

// --- COUNTDOWN LOGIC ---
let cdInterval;
let cdSeconds = 0;

function startCountdown() {
    clearInterval(cdInterval);
    const mins = parseInt(document.getElementById('cd-mins').value) || 0;
    if (cdSeconds <= 0) cdSeconds = mins * 60;
    
    cdInterval = setInterval(() => {
        if (cdSeconds <= 0) {
            clearInterval(cdInterval);
            alert("Time's Up!");
            return;
        }
        cdSeconds--;
        updateCDDisplay();
    }, 1000);
}

function resetCountdown() {
    clearInterval(cdInterval);
    cdSeconds = 0;
    updateCDDisplay();
}

function updateCDDisplay() {
    const m = Math.floor(cdSeconds / 60);
    const s = cdSeconds % 60;
    document.getElementById('cd-display').innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

// --- STOPWATCH LOGIC ---
let swInterval;
let swTime = 0; // in tenths of a second
let swRunning = false;

function toggleStopwatch() {
    const btn = document.getElementById('sw-btn');
    if (!swRunning) {
        swRunning = true;
        btn.innerText = "Stop";
        btn.className = "btn btn-stop";
        swInterval = setInterval(() => {
            swTime++;
            updateSWDisplay();
        }, 100);
    } else {
        swRunning = false;
        btn.innerText = "Start";
        btn.className = "btn btn-start";
        clearInterval(swInterval);
    }
}

function resetStopwatch() {
    clearInterval(swInterval);
    swTime = 0;
    swRunning = false;
    document.getElementById('sw-btn').innerText = "Start";
    document.getElementById('sw-btn').className = "btn btn-start";
    updateSWDisplay();
}

function updateSWDisplay() {
    const m = Math.floor(swTime / 600);
    const s = Math.floor((swTime % 600) / 10);
    const t = swTime % 10;
    document.getElementById('sw-display').innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${t}`;
}

// --- UTILS & SEARCH ---
function switchView(v) {
    document.getElementById('results').classList.toggle('hidden', v === 'util');
    document.getElementById('util-view').classList.toggle('hidden', v === 'all');
    document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (v === 'all' && i === 0) || (v === 'util' && i === 1)));
}

function toggleTheme() {
    document.body.setAttribute('data-theme', document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
}

const input = document.getElementById('main-in');
input.addEventListener('input', async () => {
    const q = input.value.trim();
    const resDiv = document.getElementById('results');
    if(!q) { resDiv.innerHTML = ''; return; }
    
    try {
        const r = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(q)}?origin=*`);
        const data = await r.json();
        resDiv.innerHTML = data.extract ? `<div class="card fact-card"><h3>${data.title}</h3><p>${data.extract}</p></div>` : '';
        resDiv.innerHTML += `<div class="card"><a href="https://youtube.com/results?q=${q}" target="_blank">🎬 Watch ${q}</a></div>`;
    } catch(e) {}
});

// Weather
navigator.geolocation.getCurrentPosition(async (p) => {
    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${p.coords.latitude}&longitude=${p.coords.longitude}&current_weather=true`);
    const d = await res.json();
    document.getElementById('w-info').innerText = `Temp: ${Math.round(d.current_weather.temperature)}°C`;
});
</script>
</body>
</html>
