<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Litelead</title>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.basic.min.js"></script>
    <style>
        body { margin:0; background:#f0f4f8; font-family: sans-serif; display:flex; justify-content:center; align-items:center; height:100vh; }
        .glass { background:white; padding:40px; border-radius:30px; box-shadow:0 20px 50px rgba(0,0,0,0.1); width:400px; text-align:center; }
        /* Logo Styles */
        #brand-logo { color:#3b82f6; font-weight:bold; font-size:1.5rem; margin-bottom:10px; display:block; }
        input { width:100%; padding:15px; border-radius:25px; border:1px solid #ddd; outline:none; box-sizing:border-box; font-size:1rem; }
        .tabs { display:flex; justify-content:space-around; margin:15px 0; }
        .tab-btn { background:none; border:none; cursor:pointer; font-weight:bold; opacity:0.5; }
        .tab-btn.active { opacity:1; color:#3b82f6; border-bottom:2px solid #3b82f6; }
        #results { margin-top:20px; text-align:left; max-height:200px; overflow-y:auto; }
        .item { padding:10px; border-bottom:1px solid #eee; animation: fadeIn 0.3s; }
        .item a { color:#3b82f6; text-decoration:none; font-weight:bold; }
        @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    </style>
</head>
<body>
    <div class="glass">
        <span id="brand-logo">Litelead</span>
        <input type="text" id="search" placeholder="Search the index...">
        <div class="tabs">
            <button class="tab-btn active" data-cat="all">All</button>
            <button class="tab-btn" data-cat="photos">Photos</button>
            <button class="tab-btn" data-cat="videos">Videos</button>
        </div>
        <div id="results"></div>
    </div>

    <script>
        let fuse;
        const input = document.getElementById('search');
        const resultsDiv = document.getElementById('results');
        const tabs = document.querySelectorAll('.tab-btn');

        // Force fetch from GitHub with a timestamp to avoid cache issues
        fetch('./data.json?t=' + Date.now())
            .then(res => res.json())
            .then(data => {
                fuse = new Fuse(data, { keys: ['title', 'description'], threshold: 0.3 });
                console.log("Index Loaded");
            });

        function doSearch() {
            const query = input.value.trim();
            const activeTab = document.querySelector('.tab-btn.active').dataset.cat;
            if (!query || !fuse) { resultsDiv.innerHTML = ''; return; }
            
            let results = fuse.search(query);
            if (activeTab !== 'all') {
                results = results.filter(r => r.item.category === activeTab);
            }

            resultsDiv.innerHTML = results.map(r => `
                <div class="item">
                    <a href="${r.item.url}" target="_blank">${r.item.title}</a>
                    <div style="font-size:0.8rem; color:grey;">${r.item.description}</div>
                </div>
            `).join('');
        }

        input.addEventListener('input', doSearch);

        tabs.forEach(btn => {
            btn.addEventListener('click', () => {
                tabs.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                doSearch();
            });
        });
    </script>
</body>
</html>
