<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Litelead Sentient OS</title>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.basic.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #3b82f6; --dark: #1e293b; --glass: rgba(255,255,255,0.6); }
        body { margin:0; background: #eef2f7; font-family: 'Quicksand', sans-serif; display:flex; flex-direction:column; align-items:center; min-height:100vh; color: #002d40; }
        
        /* Header: Logo & Time */
        .header { width: 100%; max-width: 700px; display: flex; justify-content: space-between; padding: 25px; box-sizing: border-box; }
        #logo { color: var(--accent); font-size: 1.6rem; letter-spacing: -1px; }
        #clock { font-size: 1.4rem; opacity: 0.7; }

        /* Search & Nav Section */
        .search-area { position: sticky; top: 0; width: 100%; background: rgba(238, 242, 247, 0.9); backdrop-filter: blur(20px); z-index: 100; display: flex; flex-direction: column; align-items:center; padding: 15px 0; }
        input { width: 90%; max-width: 550px; padding: 18px 25px; border-radius: 40px; border: none; background: white; font-size: 1.2rem; outline: none; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }

        /* Navigation Tabs */
        .tabs { display: flex; gap: 12px; margin-top: 15px; }
        .tab-btn { background: white; border: none; padding: 8px 18px; border-radius: 20px; cursor: pointer; font-family: inherit; font-weight: 700; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .tab-btn.active { background: var(--accent); color: white; transform: translateY(-2px); }

        /* The Animated Wall */
        #main-wall { width: 90%; max-width: 600px; padding: 20px 0 100px 0; }
        
        /* SENTIENT FACT CARD */
        .fact-card { background: linear-gradient(135deg, var(--dark), #0f172a); color: white; padding: 30px; border-radius: 35px; margin-bottom: 20px; box-shadow: 0 25px 50px rgba(0,0,0,0.15); animation: bounceDrop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .fact-card h2 { margin: 0 0 10px 0; color: var(--accent); }

        /* Dedicated Media Cards */
        .media-card { background: white; padding: 15px 20px; border-radius: 25px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px; animation: bounceDrop 0.5s ease forwards; border: 1px solid rgba(0,0,0,0.02); }
        .media-card a { color: var(--accent); text-decoration: none; font-weight: bold; flex-grow: 1; }
        .media-icon { font-size: 1.2rem; }

        /* Utility View */
        .util-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; animation: bounceDrop 0.5s ease; }
        .util-card { background: white; padding: 25px; border-radius: 30px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.02); }

        @keyframes bounceDrop { 
            0% { opacity: 0; transform: translateY(-40px) scale(0.95); } 
            100% { opacity: 1; transform: translateY(0) scale(1); } 
        }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="header">
    <div id="logo">Litelead</div>
    <div id="clock">00:00</div>
</div>

<div class="search-area">
    <input type="text" id="main-in" placeholder="Search person, place, or thing..." autocomplete="off">
    <div class="tabs">
        <button class="tab-btn active" data-target="all">All</button>
        <button class="tab-btn" data-target="photos">Photos</button>
        <button class="tab-btn" data-target="videos">Videos</button>
