<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Litelead Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2/dist/fuse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #3b82f6; --bg: #eef2f7; --card: #ffffff; --text: #1e293b; --glass: rgba(238, 242, 247, 0.9); }
        [data-theme="dark"] { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --glass: rgba(15, 23, 42, 0.9); }

        body { margin:0; background: var(--bg); color: var(--text); font-family: 'Quicksand', sans-serif; display:flex; flex-direction:column; align-items:center; min-height: 100vh; transition: 0.3s; }
        .header { width: 100%; max-width: 700px; display: flex; justify-content: space-between; padding: 20px; box-sizing: border-box; }
        #clock { font-size: 1.5rem; opacity: 0.8; }

        .search-sticky { position: sticky; top: 0; width: 100%; background: var(--glass); backdrop-filter: blur(10px); padding: 15px 0; z-index: 100; display: flex; flex-direction: column; align-items: center; }
        input#main-in { width: 90%; max-width: 500px; padding: 18px 25px; border-radius: 35px; border: none; background: var(--card); color: var(--text); font-size: 1.1rem; box-shadow: 0 10px 30px rgba(0,0,0,0.05); outline: none; }

        .tabs { display: flex; gap: 10px; margin-top: 15px; }
        .tab { background: var(--card); color: var(--text); border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; font-family: inherit; }
        .tab.active { background: var(--accent); color: white; }

        #content-wall { width: 90%; max-width: 600px; margin-top: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 25px; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.02); animation: bounce 0.4s ease; }
        
        /* Smooth Currency Scroller */
        .currency-scroller { 
            height: 120px; overflow-y: scroll; padding-right: 10px;
            scrollbar-width: thin; scrollbar-color: var(--accent) transparent;
            -webkit-overflow-scrolling: touch; 
        }
        .curr-item { 
            display: flex; justify-content: space-between; padding: 8px 12px; 
            background: rgba(128,128,128,0.05); border-radius: 12px; margin-bottom: 6px; 
            font-size: 0.85rem; transition: 0.2s;
        }
        .curr-item:hover { background: rgba(59, 130, 246, 0.1); }

        /* 12-Month Calendar Grid */
        .annual-cal { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); 
            gap: 15px; height: 300px; overflow-y: auto; padding: 10px;
        }
        .month-mini { font-size: 0.6rem; text-align: center; }
        .mini-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; margin-top: 5px; }
        .mini-day { padding: 2px; }
        .mini-today { background: var(--accent); color: white; border-radius: 4px; }

        @keyframes bounce { 0% { opacity:0; transform: translateY(-20px); } 100% { opacity:1; transform: translateY(0); } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="header">
    <div style="color:var(--accent); font-size:1.5rem;">Litelead</div>
    <div id="clock">00:00</div>
</div>

<div class="search-sticky">
    <input type="text" id="main-in" placeholder="Search sentient index..." autocomplete="off">
    <div class="tabs">
        <button class="tab active" onclick="switchView('all')">Search</button>
        <button class="tab" onclick="switchView('util')">Utilities</button>
    </div>
</div>

<div id="content-wall">
    <div id="results"></div>
    
    <div id="util-view" class="hidden">
        <div class="card">
            <div style="font-size:0.7rem; opacity:0.5; margin-bottom:10px;">GLOBAL CURRENCIES (Base: $1 USD)</div>
            <div class="currency-scroller" id="curr-list"></div>
        </div>

        <div class="card">
            <div style="font-size:0.7rem; opacity:0.5; margin-bottom:10px;">2026 ANNUAL CALENDAR</div>
            <div class="annual-cal" id="full-year"></div>
        </div>

        <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
            <div id="w-info">Weather: Fetching...</div>
            <button onclick="toggleTheme()" style="background:var(--accent); color:white; border:none; padding:8px 15px; border-radius:15px; cursor:pointer;">Theme</button>
        </div>
    </div>
</div>

<script>
const rates = { GBP: 0.79, EUR: 0.92, JPY: 150.2, CAD: 1.35, AUD: 1.53, CHF: 0.88, CNY: 7.19, INR: 82.9, BRL: 4.95, KRW: 1332 };

function updateClock() {
    document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}
setInterval(updateClock, 1000); updateClock();

// --- 12 MONTH CALENDAR ENGINE ---
function buildYear() {
    const year = 2026;
    const container = document.getElementById('full-year');
    const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
    const today = new Date();

    months.forEach((name, mIndex) => {
        const monthDiv = document.createElement('div');
        monthDiv.className = 'month-mini';
        monthDiv.innerHTML = `<div style="font-weight:bold; color:var(--accent);">${name}</div>`;
        
        const grid = document.createElement('div');
        grid.className = 'mini-grid';
        
        const firstDay = new Date(year, mIndex, 1).getDay();
        const days = new Date(year, mIndex + 1, 0).getDate();

        for(let i=0; i<firstDay; i++) grid.innerHTML += '<div></div>';
        for(let d=1; d<=days; d++) {
            const isToday = (today.getFullYear() === year && today.getMonth() === mIndex && today.getDate() === d) ? 'mini-today' : '';
            grid.innerHTML += `<div class="mini-day ${isToday}">${d}</div>`;
        }
        monthDiv.appendChild(grid);
        container.appendChild(monthDiv);
    });
}

// --- CURRENCY RENDERER ---
function renderCurrencies() {
    const list = document.getElementById('curr-list');
    list.innerHTML = Object.entries(rates).map(([c, r]) => `
        <div class="curr-item"><b>${c}</b><span>${r.toFixed(2)}</span></div>
    `).join('');
}

// --- SEARCH ENGINE ---
const input = document.getElementById('main-in');
input.addEventListener('input', async () => {
    const q = input.value.trim();
    const res = document.getElementById('results');
    if(!q) { res.innerHTML = ''; return; }
    
    const r = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(q)}?origin=*`);
    const d = await r.json();
    res.innerHTML = d.extract ? `<div class="card" style="background:var(--accent); color:white;"><h3>${d.title}</h3><p style="font-size:0.85rem;">${d.extract}</p></div>` : '';
    res.innerHTML += `<div class="card"><a href="https://youtube.com/results?q=${q}" target="_blank" style="color:var(--accent); text-decoration:none;">🎬 Video Index for ${q}</a></div>`;
});

function switchView(v) {
    document.getElementById('results').classList.toggle('hidden', v === 'util');
    document.getElementById('util-view').classList.toggle('hidden', v === 'all');
    document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (v === 'all' && i === 0) || (v === 'util' && i === 1)));
}

function toggleTheme() {
    document.body.setAttribute('data-theme', document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
}

// --- WEATHER ---
navigator.geolocation.getCurrentPosition(async (p) => {
    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${p.coords.latitude}&longitude=${p.coords.longitude}&current_weather=true`);
    const d = await res.json();
    document.getElementById('w-info').innerText = `Weather: ${Math.round(d.current_weather.temperature)}°C`;
});

buildYear();
renderCurrencies();
</script>
</body>
</html>
