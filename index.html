<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Litelead Advanced</title>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.basic.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #3b82f6; --bg: #f0f4f8; }
        body { margin:0; background: var(--bg); font-family: 'Quicksand', sans-serif; display:flex; flex-direction:column; align-items:center; min-height:100vh; }
        
        /* Header & Logo */
        .header { width: 100%; max-width: 600px; display: flex; justify-content: space-between; padding: 20px; box-sizing: border-box; }
        #logo { color: var(--accent); font-size: 1.5rem; }
        #clock { font-size: 1.5rem; opacity: 0.6; }

        /* Search Window */
        .search-window { position: sticky; top: 0; width: 100%; background: rgba(240,244,248,0.9); backdrop-filter: blur(15px); padding: 20px 0; z-index: 100; display: flex; flex-direction: column; align-items:center; }
        input { width: 90%; max-width: 500px; padding: 18px 25px; border-radius: 35px; border: none; background: white; font-size: 1.2rem; outline: none; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }

        /* The Bounce Window (Results) */
        #main-wall { width: 90%; max-width: 550px; padding: 20px 0; }
        
        /* THE INSTANT ANSWER CARD (The "Advanced" part) */
        .instant-card {
            background: linear-gradient(135deg, #1e293b, #0f172a); color: white;
            padding: 30px; border-radius: 30px; margin-bottom: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            animation: bounceIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .standard-card {
            background: white; padding: 20px; border-radius: 25px; margin-bottom: 15px;
            animation: bounceIn 0.5s ease forwards; box-shadow: 0 5px 15px rgba(0,0,0,0.02);
        }
        .standard-card a { color: var(--accent); text-decoration: none; font-weight: bold; }

        @keyframes bounceIn {
            0% { opacity: 0; transform: translateY(-40px) scale(0.9); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
    </style>
</head>
<body>

<div class="header">
    <div id="logo">Litelead</div>
    <div id="clock">00:00</div>
</div>

<div class="search-window">
    <input type="text" id="search-in" placeholder="Ask a question or search..." autocomplete="off">
</div>

<div id="main-wall"></div>

<script>
    const wall = document.getElementById('main-wall');
    const input = document.getElementById('search-in');

    // Simple Data for Demo (Your data.json would load here)

    ];

    // 1. CLOCK
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    }, 1000);

    // 2. THE "BRAIN" (Instant Answer Logic)
    function getInstantAnswer(q) {
        q = q.toLowerCase();
        
        // Example: If user asks about time
        if (q.includes("time")) return `The current time is ${new Date().toLocaleTimeString()}.`;
        
        // Example: If user asks about specific music
        if (q.includes("tri paloski")) return "Tri Paloski is a famous Hardbass track often associated with Slavic 'Gopnik' culture.";
        
        // Example: If user asks "Who is"
        if (q.includes("who is dantdm")) return "DanTDM (Daniel Robert Middleton) is a British YouTuber known for his Minecraft videos and gaming content.";
        
        return null;
    }

    // 3. RENDER ENGINE
    input.addEventListener('input', () => {
        const q = input.value.trim();
        wall.innerHTML = '';
        if (!q) return;

        const answer = getInstantAnswer(q);
