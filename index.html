<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Litelead Sentient</title>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.basic.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #3b82f6; --dark: #1e293b; }
        body { margin:0; background: #f0f4f8; font-family: 'Quicksand', sans-serif; display:flex; flex-direction:column; align-items:center; min-height:100vh; }
        
        /* Fixed Header */
        .header { width: 100%; max-width: 600px; display: flex; justify-content: space-between; padding: 20px; box-sizing: border-box; }
        #logo { color: var(--accent); font-size: 1.5rem; }
        #clock { font-size: 1.5rem; opacity: 0.6; }

        /* Floating Search Area */
        .search-window { position: sticky; top: 0; width: 100%; background: rgba(240,244,248,0.9); backdrop-filter: blur(15px); padding: 20px 0; z-index: 100; display: flex; flex-direction: column; align-items:center; }
        input { width: 90%; max-width: 500px; padding: 18px 25px; border-radius: 35px; border: none; background: white; font-size: 1.2rem; outline: none; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }

        /* The Animated Wall */
        #main-wall { width: 90%; max-width: 550px; padding: 20px 0 100px 0; }
        
        /* SENTIENT FACT CARD */
        .fact-card {
            background: linear-gradient(135deg, var(--dark), #0f172a); color: white;
            padding: 30px; border-radius: 30px; margin-bottom: 25px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            animation: bounceIn 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .fact-card h2 { margin: 0 0 10px 0; font-size: 1.5rem; color: var(--accent); }

        .standard-card {
            background: white; padding: 20px; border-radius: 25px; margin-bottom: 15px;
            animation: bounceIn 0.5s ease forwards; box-shadow: 0 5px 15px rgba(0,0,0,0.02);
            border: 1px solid rgba(0,0,0,0.03);
        }
        .standard-card a { color: var(--accent); text-decoration: none; font-weight: bold; }

        @keyframes bounceIn {
            0% { opacity: 0; transform: translateY(-40px) scale(0.9); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
    </style>
</head>
<body>

<div class="header">
    <div id="logo">Litelead</div>
    <div id="clock">00:00</div>
</div>

<div class="search-window">
    <input type="text" id="search-in" placeholder="Ask about anything..." autocomplete="off">
</div>

<div id="main-wall"></div>

<script>
    const wall = document.getElementById('main-wall');
    const input = document.getElementById('search-in');
    let searchTimeout;

    // 1. CLOCK
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    }, 1000);

    // 2. THE SENTIENT BRAIN (Wikipedia Fetcher)
    async function getWikiFact(query) {
        if (query.length < 3) return null;
        try {
            const url = `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`;
            const response = await fetch(url);
            if (!response.ok) return null;
            return await response.json();
        } catch (e) { return null; }
    }

    // 3. RENDER ENGINE
    input.addEventListener('input', () => {
        const q = input.value.trim();
        clearTimeout(searchTimeout);

        if (!q) { wall.innerHTML = ''; return; }

        // Debounce to prevent hitting the API too fast
        searchTimeout = setTimeout(async () => {
            const fact = await getWikiFact(q);
            wall.innerHTML = '';

            if (fact && fact.extract) {
                const card = document.createElement('div');
                card.className = 'fact-card';
                card.innerHTML = `
                    <div style="font-size:0.7rem; opacity:0.5; margin-bottom:10px; letter-spacing:1px;">LITELEAD KNOWLEDGE CARD</div>
                    <h2>${fact.title}</h2>
                    <p style="line-height:1.5; font-size:1.1rem;">${fact.extract}</p>
                    <a href="${fact.content_urls.desktop.page}" target="_blank" style="color:var(--accent); font-size:0.8rem;">Read More on Wikipedia →</a>
                `;
                wall.appendChild(card);
            }

            // Fallback: Show specific Youtube/Google buttons if no wiki fact
            if (!fact) {
                const fallback = document.createElement('div');
                fallback.className = 'standard-card';
                fallback.innerHTML = `<a href="https://youtube.com/results?search_query=${q}" target="_blank">Search YouTube for "${q}"</a>`;
                wall.appendChild(fallback);
            }
        }, 400); // 400ms delay after typing stops
    });
</script>

</body>
</html>
